<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Demandas — Auditoria de Dados</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #08090d; cursor: pointer; }

  #intro {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #08090d;
    transition: opacity .55s ease;
    user-select: none;
  }

  .g-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.016) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.016) 1px, transparent 1px);
    background-size: 64px 64px;
    animation: gridDrift 35s linear infinite;
  }
  @keyframes gridDrift {
    0%   { background-position: 0 0, 0 0; }
    100% { background-position: 64px 64px, 64px 64px; }
  }

  .g-scan {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,.055) 3px, rgba(0,0,0,.055) 4px
    );
    pointer-events: none;
  }

  .g-vig {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 75% at 50% 50%, transparent 42%, rgba(0,0,0,.74) 100%);
    pointer-events: none;
  }

  .g-glow {
    position: absolute; left: 50%; top: 47%;
    transform: translate(-50%, -50%);
    width: 380px; height: 380px; border-radius: 50%;
    background: radial-gradient(ellipse, rgba(200,32,58,.065) 0%, transparent 68%);
    pointer-events: none;
    animation: glowPulse 4.5s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: .7; transform: translate(-50%, -50%) scale(1); }
    50%       { opacity: 1; transform: translate(-50%, -50%) scale(1.06); }
  }

  .corner {
    position: absolute; font-size: 10px; letter-spacing: .14em;
    color: rgba(255,255,255,.17); text-transform: uppercase;
    font-family: 'Courier New', monospace;
    opacity: 0; animation: cfade 1s ease var(--d, .8s) forwards;
  }
  .tl { top: 26px; left: 30px; --d: .7s; }
  .tr { top: 26px; right: 30px; --d: .9s; text-align: right; }
  .bl { bottom: 26px; left: 30px; --d: 1.1s; }
  .br { bottom: 26px; right: 30px; --d: .9s; text-align: right; }
  @keyframes cfade { to { opacity: 1; } }

  .h-line {
    position: absolute; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(200,32,58,.28) 50%, transparent 100%);
    opacity: 0; animation: cfade 1.2s ease .5s forwards;
  }
  .h-line.top { top: 64px; }
  .h-line.bot { bottom: 64px; }

  .center {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    padding: 0 24px;
  }

  .logo-wrap {
    margin-bottom: 30px;
    opacity: 0; transform: scale(.62);
    animation: logoIn .9s cubic-bezier(.34,1.56,.64,1) .2s forwards;
  }
  @keyframes logoIn { to { opacity: 1; transform: scale(1); } }

  .logo-circle {
    width: 112px; height: 112px; border-radius: 50%;
    background: #C8203A;
    display: flex; align-items: center; justify-content: center;
    animation: logoGlow 3.5s ease-in-out 1.1s infinite;
  }
  @keyframes logoGlow {
    0%, 100% { box-shadow: 0 0 30px rgba(200,32,58,.38), 0 0 75px rgba(200,32,58,.12); }
    50%       { box-shadow: 0 0 52px rgba(200,32,58,.58), 0 0 105px rgba(200,32,58,.22); }
  }
  .logo-letters {
    color: #fff;
    font-family: 'Arial Black', Impact, 'Helvetica Neue', sans-serif;
    font-weight: 900; line-height: 1;
    display: flex; align-items: baseline; gap: 1px;
    letter-spacing: -.02em;
  }
  .logo-f { font-size: 2.9rem; }
  .logo-c { font-size: 2.2rem; }

  .sep {
    height: 1px; width: 0; margin: 0 auto 28px;
    background: linear-gradient(90deg, transparent, rgba(200,32,58,.72), transparent);
    animation: sepGrow .6s ease 1.05s forwards;
  }
  @keyframes sepGrow { to { width: 180px; } }

  .t-main {
    font-size: clamp(1rem, 3.5vw, 1.6rem); font-weight: 900;
    letter-spacing: .22em; color: #fff; text-transform: uppercase;
    opacity: 0; transform: translateY(14px);
    animation: slideUp .6s ease .82s forwards;
    margin-bottom: 10px;
  }
  .t-sub {
    font-size: clamp(.65rem, 2vw, .8rem); letter-spacing: .2em;
    color: rgba(255,255,255,.3); text-transform: uppercase;
    opacity: 0; transform: translateY(10px);
    animation: slideUp .6s ease 1.05s forwards;
    margin-bottom: 54px;
  }
  @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

  .continue {
    font-size: .7rem; letter-spacing: .3em;
    color: rgba(255,255,255,.35); text-transform: uppercase;
    font-family: 'Courier New', monospace;
    opacity: 0; animation: cfade .5s ease 2.1s forwards;
  }
  .continue-inner {
    animation: blink 1.65s ease-in-out 2.2s infinite;
    display: inline-block;
  }
  @keyframes blink { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    .logo-wrap, .sep, .t-main, .t-sub, .continue, .corner, .h-line { animation: none !important; opacity: 1 !important; transform: none !important; }
    .sep { width: 180px !important; }
  }
</style>
</head>
<body>

<div id="intro">
  <div class="g-grid"></div>
  <div class="g-scan"></div>
  <div class="g-vig"></div>
  <div class="g-glow"></div>
  <div class="h-line top"></div>
  <div class="h-line bot"></div>

  <span class="corner tl">Auditoria de Dados</span>
  <span class="corner tr">v 1.0</span>
  <span class="corner bl">Ferreira Costa &amp; Cia</span>
  <span class="corner br">2025 · Confidencial</span>

  <div class="center">
    <div class="logo-wrap">
      <div class="logo-circle">
        <div class="logo-letters">
          <span class="logo-f">F</span><span class="logo-c">c</span>
        </div>
      </div>
    </div>
    <div class="sep"></div>
    <div class="t-main">Gestão de Demandas</div>
    <div class="t-sub">Auditoria de Dados · Ferreira Costa</div>
    <div class="continue"><span class="continue-inner">— Clique para continuar —</span></div>
  </div>
</div>

<script>
  let gone = false;
  function go() {
    if (gone) return; gone = true;
    const el = document.getElementById('intro');
    el.style.opacity = '0';
    setTimeout(() => { window.location.href = 'menu.html'; }, 570);
  }
  document.getElementById('intro').addEventListener('click', go);
  document.addEventListener('keydown', function(e) {
    if (['Tab','Alt','Control','Shift','Meta','F5','F11','F12'].indexOf(e.key) === -1) go();
  });
</script>
</body>
</html>
